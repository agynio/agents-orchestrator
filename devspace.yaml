version: v2beta1

vars:
  ORCHESTRATOR_NAMESPACE: platform
  DEV_IMAGE: ghcr.io/agynio/devcontainer-go:1
  E2E_IMAGE: ghcr.io/agynio/devcontainer-go:1

functions:
  disable_argocd_sync: |-
    if kubectl get application agents-orchestrator -n argocd >/dev/null 2>&1; then
      echo "Disabling ArgoCD auto-sync for agents-orchestrator..."
      kubectl patch application agents-orchestrator -n argocd \
        --type merge \
        -p '{"spec":{"syncPolicy":{"automated":null}}}'
      echo "ArgoCD auto-sync disabled."
    else
      echo "WARNING: ArgoCD Application 'agents-orchestrator' not found in argocd namespace."
    fi
  restore_argocd_sync: &restore_argocd_sync |-
    if kubectl get application agents-orchestrator -n argocd >/dev/null 2>&1; then
      echo "Re-enabling ArgoCD auto-sync for agents-orchestrator..."
      kubectl patch application agents-orchestrator -n argocd \
        --type merge \
        -p '{"spec":{"syncPolicy":{"automated":{"prune":true,"selfHeal":true}}}}'
      echo "ArgoCD auto-sync restored."
    else
      echo "WARNING: ArgoCD Application 'agents-orchestrator' not found in argocd namespace."
    fi
  patch_deployment: |-
    echo "Registering k8s-runner with runners service..."
    kubectl run register-runner --rm -i --restart=Never \
      --image=ghcr.io/agynio/devcontainer-go:1 \
      -n ${ORCHESTRATOR_NAMESPACE} \
      --override-type=strategic \
      --overrides='{"spec":{"securityContext":{"runAsUser":1000,"fsGroup":1000}}}' \
      -- buf curl \
        --schema buf.build/agynio/api \
        --protocol grpc \
        --http2-prior-knowledge \
        -d '{"name":"k8s-runner"}' \
        http://runners:50051/agynio.api.runners.v1.RunnersService/RegisterRunner 2>&1 || true
    echo "Updating runner status to enrolled..."
    kubectl exec -n ${ORCHESTRATOR_NAMESPACE} runners-db-0 -- \
      psql -U runners -d runners -c "UPDATE runners SET status = 'enrolled' WHERE name = 'k8s-runner'" || true
    echo "Runner setup complete."
    echo "Patching agents-orchestrator deployment for DevSpace..."
    kubectl patch deployment agents-orchestrator -n ${ORCHESTRATOR_NAMESPACE} --type strategic --patch "$(cat <<'EOF'
    spec:
      template:
        spec:
          securityContext:
            runAsUser: 1000
            fsGroup: 1000
          initContainers: []
          volumes:
            - name: data
              emptyDir: {}
          containers:
            - name: agents-orchestrator
              image: ghcr.io/agynio/devcontainer-go:1 # keep in sync with DEV_IMAGE
              env:
                - name: AGENT_LLM_BASE_URL
                  value: "http://llm-proxy-llm-proxy:8080/v1"
                - name: AGENT_GATEWAY_ADDRESS
                  value: "gateway-gateway.platform.svc.cluster.local:8080"
                - name: ZITI_ENABLED
                  value: "false"
                - name: DEFAULT_INIT_IMAGE
                  value: "ghcr.io/agynio/agent-init-codex:0.11.0"
              workingDir: /opt/app/data
              command:
                - sh
                - -c
                - |
                  set -eu
                  elapsed=0
                  while [ ! -f /opt/app/data/go.mod ]; do
                    sleep 1; elapsed=$((elapsed + 1))
                    [ "$elapsed" -ge 120 ] && { echo "ERROR: sync timeout" >&2; exit 1; }
                  done
                  buf generate buf.build/agynio/api \
                    --include-imports \
                    --path agynio/api/runner/v1 \
                    --path agynio/api/runners/v1 \
                    --path agynio/api/threads/v1 \
                    --path agynio/api/notifications/v1 \
                    --path agynio/api/agents/v1 \
                    --path agynio/api/secrets/v1 \
                    --path agynio/api/ziti_management/v1 \
                    --path agynio/api/identity/v1 \
                    --path agynio/api/users/v1 \
                    --path agynio/api/organizations/v1
                  exec go run ./cmd/orchestrator
              volumeMounts:
                - name: data
                  mountPath: /opt/app/data
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                limits:
                  cpu: "2"
                  memory: 4Gi
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                readOnlyRootFilesystem: false
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
    EOF
    )"
    if [ -n "${CLUSTER_ADMIN_TOKEN:-}" ]; then
      kubectl set env deployment/agents-orchestrator -n ${ORCHESTRATOR_NAMESPACE} AGENT_AUTH_TOKEN="${CLUSTER_ADMIN_TOKEN}"
    fi
  wait_for_orchestrator: |-
    echo "Waiting for orchestrator deployment to roll out..."
    kubectl rollout status deployment/agents-orchestrator \
      -n ${ORCHESTRATOR_NAMESPACE} --timeout=120s

    echo "Waiting for orchestrator source sync and process start..."
    ELAPSED=0
    LABEL_SELECTOR="app.kubernetes.io/name=agents-orchestrator,app.kubernetes.io/instance=agents-orchestrator"
    until kubectl logs -n ${ORCHESTRATOR_NAMESPACE} -l "${LABEL_SELECTOR}" --tail=200 2>/dev/null | \
      grep -q "orchestrator: ready"; do
      sleep 5
      ELAPSED=$((ELAPSED + 5))
      if [ "$ELAPSED" -ge 600 ]; then
        echo "ERROR: orchestrator ready log not found within 600s" >&2
        echo "Diagnostic pod list:" >&2
        kubectl get pods -n ${ORCHESTRATOR_NAMESPACE} -l "${LABEL_SELECTOR}" -o wide >&2 || true
        echo "Diagnostic logs (tail 200):" >&2
        kubectl logs -n ${ORCHESTRATOR_NAMESPACE} -l "${LABEL_SELECTOR}" --tail=200 >&2 || true
        exit 1
      fi
      echo "  still waiting... (${ELAPSED}s)"
    done
    echo "Orchestrator is running from source."

deployments:
  e2e-runner:
    namespace: ${ORCHESTRATOR_NAMESPACE}
    helm:
      chart:
        name: component-chart
        repo: https://charts.devspace.sh
      values:
        securityContext:
          runAsUser: 1000
          fsGroup: 1000
        containers:
          - image: ${E2E_IMAGE}
            env:
              - name: AGENTS_ADDRESS
                value: "agents:50051"
              - name: THREADS_ADDRESS
                value: "threads:50051"
              - name: IDENTITY_ADDRESS
                value: "identity:50051"
              - name: LLM_ADDRESS
                value: "llm:50051"
              - name: USERS_ADDRESS
                value: "users:50051"
              - name: ORGANIZATIONS_ADDRESS
                value: "tenants:50051"
              - name: RUNNER_ADDRESS
                value: "k8s-runner:50051"
            volumeMounts:
              - containerPath: /opt/app/data
                volume:
                  name: data
        volumes:
          - name: data
            emptyDir: {}
        labels:
          app.kubernetes.io/name: agents-orchestrator-e2e

commands:
  test-e2e: |-
    devspace run-pipeline test-e2e -n ${DEVSPACE_NAMESPACE} $@
  deploy: |-
    devspace run-pipeline deploy -n ${DEVSPACE_NAMESPACE} $@
  restore-argocd: |-
    devspace run-pipeline restore-argocd -n ${DEVSPACE_NAMESPACE} $@

pipelines:
  dev:
    flags:
      - name: watch
        short: w
        description: "Keep DevSpace running and stream logs"
    run: |-
      trap 'echo "Restoring ArgoCD sync..."; restore_argocd_sync' EXIT
      disable_argocd_sync
      patch_deployment
      if [ "$(get_flag "watch")" == "true" ]; then
        start_dev --disable-pod-replace agents-orchestrator
      else
        start_dev --disable-pod-replace agents-orchestrator
        sleep 10
        echo "Dev environment ready. Stopping dev session."
        stop_dev agents-orchestrator
      fi

  deploy:
    run: |-
      disable_argocd_sync
      patch_deployment
      start_dev --disable-pod-replace agents-orchestrator-deploy
      wait_for_orchestrator
      echo "Deploy complete. Orchestrator is running from source."

  test-e2e:
    run: |-
      create_deployments e2e-runner
      start_dev e2e-runner-test
      echo "Sync complete. Running e2e tests..."
      exec_container \
        --label-selector "app.kubernetes.io/name=agents-orchestrator-e2e" \
        -n ${ORCHESTRATOR_NAMESPACE} \
        -- bash -c 'cd /opt/app/data && buf generate buf.build/agynio/api --include-imports --path agynio/api/runner/v1 --path agynio/api/runners/v1 --path agynio/api/threads/v1 --path agynio/api/notifications/v1 --path agynio/api/agents/v1 --path agynio/api/secrets/v1 --path agynio/api/ziti_management/v1 --path agynio/api/identity/v1 --path agynio/api/users/v1 --path agynio/api/organizations/v1 && go test -v -count=1 -tags e2e ./test/e2e/'
      EXIT_CODE=$?
      purge_deployments e2e-runner
      exit $EXIT_CODE

  restore-argocd:
    run: |-
      restore_argocd_sync

dev:
  # CI counterpart: agents-orchestrator-deploy (one-shot sync)
  agents-orchestrator:
    namespace: ${ORCHESTRATOR_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: agents-orchestrator
      app.kubernetes.io/instance: agents-orchestrator
    containers:
      agents-orchestrator:
        container: agents-orchestrator
        sync:
          - path: ./:/opt/app/data
            excludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
            uploadExcludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
            downloadExcludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
        logs:
          enabled: true
          lastLines: 200

  # CI counterpart: e2e-runner-test (one-shot sync)
  e2e-runner:
    namespace: ${ORCHESTRATOR_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: agents-orchestrator-e2e
    command: ["sleep", "infinity"]
    workingDir: /opt/app/data
    sync:
      - path: ./:/opt/app/data
        excludePaths:
          - .git/
          - .devspace/
          - /.gen/
          - /tmp/

  # One-shot variant of agents-orchestrator for CI deploy pipeline. Keep sync excludePaths in sync.
  agents-orchestrator-deploy:
    namespace: ${ORCHESTRATOR_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: agents-orchestrator
      app.kubernetes.io/instance: agents-orchestrator
    containers:
      agents-orchestrator:
        container: agents-orchestrator
        sync:
          - path: ./:/opt/app/data
            noWatch: true
            excludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
            uploadExcludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
            downloadExcludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/

  # One-shot variant of e2e-runner for CI test pipeline. Keep sync excludePaths in sync.
  e2e-runner-test:
    namespace: ${ORCHESTRATOR_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: agents-orchestrator-e2e
    command: ["sleep", "infinity"]
    workingDir: /opt/app/data
    sync:
      - path: ./:/opt/app/data
        noWatch: true
        excludePaths:
          - .git/
          - .devspace/
          - /.gen/
          - /tmp/
