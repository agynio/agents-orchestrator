version: v2beta1

vars:
  ORCHESTRATOR_NAMESPACE: platform
  DEV_IMAGE: ghcr.io/agynio/devcontainer-go:1
  E2E_IMAGE: ghcr.io/agynio/devcontainer-go:1

functions:
  disable_argocd_sync: |-
    if kubectl get application agents-orchestrator -n argocd >/dev/null 2>&1; then
      echo "Disabling ArgoCD auto-sync for agents-orchestrator..."
      kubectl patch application agents-orchestrator -n argocd \
        --type merge \
        -p '{"spec":{"syncPolicy":{"automated":null}}}'
      echo "ArgoCD auto-sync disabled."
    else
      echo "WARNING: ArgoCD Application 'agents-orchestrator' not found in argocd namespace."
    fi
  restore_argocd_sync: &restore_argocd_sync |-
    if kubectl get application agents-orchestrator -n argocd >/dev/null 2>&1; then
      echo "Re-enabling ArgoCD auto-sync for agents-orchestrator..."
      kubectl patch application agents-orchestrator -n argocd \
        --type merge \
        -p '{"spec":{"syncPolicy":{"automated":{"prune":true,"selfHeal":true}}}}'
      echo "ArgoCD auto-sync restored."
    else
      echo "WARNING: ArgoCD Application 'agents-orchestrator' not found in argocd namespace."
    fi
  patch_deployment: |-
    echo "Patching agents-orchestrator deployment for DevSpace..."
    kubectl patch deployment agents-orchestrator-agents-orchestrator -n ${ORCHESTRATOR_NAMESPACE} --type strategic --patch "$(cat <<'EOF'
    spec:
      template:
        spec:
          securityContext:
            runAsUser: 1000
            fsGroup: 1000
          initContainers: []
          volumes:
            - name: data
              emptyDir: {}
          containers:
            - name: agents-orchestrator
              image: ghcr.io/agynio/devcontainer-go:1 # keep in sync with DEV_IMAGE
              workingDir: /opt/app/data
              command:
                - sh
                - -c
                - |
                  set -eu
                  elapsed=0
                  while [ ! -f /opt/app/data/go.mod ]; do
                    sleep 1; elapsed=$((elapsed + 1))
                    [ "$elapsed" -ge 120 ] && { echo "ERROR: sync timeout" >&2; exit 1; }
                  done
                  buf generate buf.build/agynio/api \
                    --path agynio/api/runner/v1 \
                    --path agynio/api/threads/v1 \
                    --path agynio/api/notifications/v1 \
                    --path agynio/api/agents/v1 \
                    --path agynio/api/secrets/v1
                  exec go run ./cmd/orchestrator
              volumeMounts:
                - name: data
                  mountPath: /opt/app/data
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                limits:
                  cpu: "2"
                  memory: 4Gi
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                readOnlyRootFilesystem: false
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
    EOF
    )"
  wait_for_orchestrator: |-
    echo "Waiting for orchestrator deployment to roll out..."
    kubectl rollout status deployment/agents-orchestrator-agents-orchestrator \
      -n ${ORCHESTRATOR_NAMESPACE} --timeout=120s

    echo "Waiting for orchestrator source sync and process start..."
    ELAPSED=0
    until exec_container \
      --label-selector "app.kubernetes.io/name=agents-orchestrator,app.kubernetes.io/instance=agents-orchestrator" \
      -n ${ORCHESTRATOR_NAMESPACE} \
      -- pgrep -f "go run ./cmd/orchestrator" >/dev/null 2>&1; do
      sleep 5
      ELAPSED=$((ELAPSED + 5))
      if [ "$ELAPSED" -ge 300 ]; then
        echo "ERROR: orchestrator process did not start within 300s" >&2
        exit 1
      fi
      echo "  still waiting... (${ELAPSED}s)"
    done
    echo "Orchestrator is running from source."

deployments:
  e2e-runner:
    namespace: ${ORCHESTRATOR_NAMESPACE}
    helm:
      chart:
        name: component-chart
        repo: https://charts.devspace.sh
      values:
        securityContext:
          runAsUser: 1000
          fsGroup: 1000
        containers:
          - image: ${E2E_IMAGE}
            env:
              - name: AGENTS_ADDRESS
                value: "agents:50051"
              - name: THREADS_ADDRESS
                value: "threads:50051"
              - name: RUNNER_ADDRESS
                value: "k8s-runner:50051"
            volumeMounts:
              - containerPath: /opt/app/data
                volume:
                  name: data
        volumes:
          - name: data
            emptyDir: {}
        labels:
          app.kubernetes.io/name: agents-orchestrator-e2e

commands:
  test-e2e: |-
    devspace run-pipeline test-e2e -n ${DEVSPACE_NAMESPACE} $@

pipelines:
  dev:
    flags:
      - name: watch
        short: w
        description: "Keep DevSpace running and stream logs"
    run: |-
      disable_argocd_sync
      patch_deployment
      if [ "$(get_flag "watch")" == "true" ]; then
        start_dev --disable-pod-replace agents-orchestrator
      else
        start_dev --disable-pod-replace agents-orchestrator
        sleep 10
        echo "Dev environment ready. Stopping dev session."
        stop_dev agents-orchestrator
      fi

  test-e2e:
    run: |-
      # --- Deploy orchestrator from PR sources ---
      disable_argocd_sync
      patch_deployment
      start_dev --disable-pod-replace agents-orchestrator &
      ORCH_DEV_PID=$!
      wait_for_orchestrator

      # --- Deploy and run e2e tests ---
      create_deployments e2e-runner
      start_dev e2e-runner &
      echo "Waiting for e2e-runner sync to complete..."
      ELAPSED=0
      until exec_container \
        --label-selector "app.kubernetes.io/name=agents-orchestrator-e2e" \
        -n ${ORCHESTRATOR_NAMESPACE} \
        -- test -f /opt/app/data/buf.gen.yaml; do
        sleep 3
        ELAPSED=$((ELAPSED + 3))
        if [ "$ELAPSED" -ge 120 ]; then
          echo "ERROR: e2e-runner sync timeout" >&2
          stop_dev agents-orchestrator || true
          exit 1
        fi
      done
      echo "Sync complete."
      exec_container \
        --label-selector "app.kubernetes.io/name=agents-orchestrator-e2e" \
        -n ${ORCHESTRATOR_NAMESPACE} \
        -- bash -c 'cd /opt/app/data && buf generate buf.build/agynio/api --path agynio/api/runner/v1 --path agynio/api/threads/v1 --path agynio/api/notifications/v1 --path agynio/api/agents/v1 --path agynio/api/secrets/v1 && go test -v -count=1 -tags e2e ./test/e2e/'
      EXIT_CODE=$?

      # --- Cleanup ---
      stop_dev e2e-runner
      purge_deployments e2e-runner
      stop_dev agents-orchestrator
      exit $EXIT_CODE

hooks:
  - name: restore-argocd-auto-sync
    events:
      - after:dev:agents-orchestrator
    command: bash
    args:
      - -c
      - *restore_argocd_sync

dev:
  agents-orchestrator:
    namespace: ${ORCHESTRATOR_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: agents-orchestrator
      app.kubernetes.io/instance: agents-orchestrator
    containers:
      agents-orchestrator:
        container: agents-orchestrator
        sync:
          - path: ./:/opt/app/data
            excludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
            uploadExcludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
            downloadExcludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
        logs:
          enabled: true
          lastLines: 200

  e2e-runner:
    namespace: ${ORCHESTRATOR_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: agents-orchestrator-e2e
    command: ["sleep", "infinity"]
    workingDir: /opt/app/data
    sync:
      - path: ./:/opt/app/data
        excludePaths:
          - .git/
          - .devspace/
          - /.gen/
          - /tmp/
