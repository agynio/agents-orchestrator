version: v2beta1

vars:
  ORCHESTRATOR_NAMESPACE: platform
  DEV_IMAGE: ghcr.io/agynio/devcontainer-go:1

functions:
  disable_argocd_sync: |-
    if kubectl get application agents-orchestrator -n argocd >/dev/null 2>&1; then
      echo "Disabling ArgoCD auto-sync for agents-orchestrator..."
      kubectl patch application agents-orchestrator -n argocd \
        --type merge \
        -p '{"spec":{"syncPolicy":{"automated":null}}}'
      echo "ArgoCD auto-sync disabled."
    else
      echo "WARNING: ArgoCD Application 'agents-orchestrator' not found in argocd namespace."
    fi
  restore_argocd_sync: &restore_argocd_sync |-
    if kubectl get application agents-orchestrator -n argocd >/dev/null 2>&1; then
      echo "Re-enabling ArgoCD auto-sync for agents-orchestrator..."
      kubectl patch application agents-orchestrator -n argocd \
        --type merge \
        -p '{"spec":{"syncPolicy":{"automated":{"prune":true,"selfHeal":true}}}}'
      echo "ArgoCD auto-sync restored."
    else
      echo "WARNING: ArgoCD Application 'agents-orchestrator' not found in argocd namespace."
    fi
  patch_deployment: |-
    echo "Patching agents-orchestrator deployment for DevSpace..."
    kubectl patch deployment agents-orchestrator -n ${ORCHESTRATOR_NAMESPACE} --type strategic --patch "$(cat <<'EOF'
    spec:
      template:
        spec:
          securityContext:
            runAsUser: 1000
            fsGroup: 1000
          initContainers: []
          volumes:
            - name: data
              emptyDir: {}
          containers:
            - name: agents-orchestrator
              image: ghcr.io/agynio/devcontainer-go:1 # keep in sync with DEV_IMAGE
              workingDir: /opt/app/data
              env:
                - name: POLL_INTERVAL
                  value: "10s"
                - name: WORKLOAD_RECONCILE_INTERVAL
                  value: "10s"
              command:
                - sh
                - -c
                - |
                  set -eu
                  elapsed=0
                  while [ ! -f /opt/app/data/go.mod ]; do
                    sleep 1; elapsed=$((elapsed + 1))
                    [ "$elapsed" -ge 240 ] && { echo "ERROR: sync timeout" >&2; exit 1; }
                  done
                  buf generate buf.build/agynio/api \
                    --include-imports \
                    --path agynio/api/runner/v1 \
                    --path agynio/api/runners/v1 \
                    --path agynio/api/threads/v1 \
                    --path agynio/api/notifications/v1 \
                    --path agynio/api/metering/v1 \
                    --path agynio/api/agents/v1 \
                    --path agynio/api/secrets/v1 \
                    --path agynio/api/ziti_management/v1 \
                    --path agynio/api/identity/v1 \
                    --path agynio/api/llm/v1 \
                    --path agynio/api/users/v1 \
                    --path agynio/api/organizations/v1 \
                    --path agynio/api/tracing/v1
                  exec go run ./cmd/orchestrator
              volumeMounts:
                - name: data
                  mountPath: /opt/app/data
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                limits:
                  cpu: "2"
                  memory: 4Gi
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                readOnlyRootFilesystem: false
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
    EOF
    )"
  wait_for_orchestrator: |-
    echo "Waiting for orchestrator deployment to roll out..."
    kubectl rollout status deployment/agents-orchestrator \
      -n ${ORCHESTRATOR_NAMESPACE} --timeout=120s

    echo "Waiting for orchestrator source sync and process start..."
    ELAPSED=0
    LABEL_SELECTOR="app.kubernetes.io/name=agents-orchestrator,app.kubernetes.io/instance=agents-orchestrator"
    until kubectl logs -n ${ORCHESTRATOR_NAMESPACE} -l "${LABEL_SELECTOR}" --tail=200 2>/dev/null | \
      grep -q "orchestrator: ready"; do
      sleep 5
      ELAPSED=$((ELAPSED + 5))
      if [ "$ELAPSED" -ge 600 ]; then
        echo "ERROR: orchestrator ready log not found within 600s" >&2
        echo "Diagnostic pod list:" >&2
        kubectl get pods -n ${ORCHESTRATOR_NAMESPACE} -l "${LABEL_SELECTOR}" -o wide >&2 || true
        echo "Diagnostic logs (tail 200):" >&2
        kubectl logs -n ${ORCHESTRATOR_NAMESPACE} -l "${LABEL_SELECTOR}" --tail=200 >&2 || true
        exit 1
      fi
      echo "  still waiting... (${ELAPSED}s)"
    done
    echo "Orchestrator is running from source."

commands:
  deploy: |-
    devspace run-pipeline deploy -n ${DEVSPACE_NAMESPACE} $@
  restore-argocd: |-
    devspace run-pipeline restore-argocd -n ${DEVSPACE_NAMESPACE} $@

pipelines:
  dev:
    flags:
      - name: watch
        short: w
        description: "Keep DevSpace running and stream logs"
    run: |-
      trap 'echo "Restoring ArgoCD sync..."; restore_argocd_sync' EXIT
      disable_argocd_sync
      patch_deployment
      if [ "$(get_flag "watch")" == "true" ]; then
        start_dev --disable-pod-replace agents-orchestrator
      else
        start_dev --disable-pod-replace agents-orchestrator
        sleep 10
        echo "Dev environment ready. Stopping dev session."
        stop_dev agents-orchestrator
      fi

  deploy:
    run: |-
      disable_argocd_sync
      patch_deployment
      start_dev --disable-pod-replace agents-orchestrator-deploy
      wait_for_orchestrator
      echo "Deploy complete. Orchestrator is running from source."

  restore-argocd:
    run: |-
      restore_argocd_sync

dev:
  # CI counterpart: agents-orchestrator-deploy (one-shot sync)
  agents-orchestrator:
    namespace: ${ORCHESTRATOR_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: agents-orchestrator
      app.kubernetes.io/instance: agents-orchestrator
    containers:
      agents-orchestrator:
        container: agents-orchestrator
        sync:
          - path: ./:/opt/app/data
            excludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
            uploadExcludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
            downloadExcludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
        logs:
          enabled: true
          lastLines: 200

  # One-shot variant of agents-orchestrator for CI deploy pipeline. Keep sync excludePaths in sync.
  agents-orchestrator-deploy:
    namespace: ${ORCHESTRATOR_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: agents-orchestrator
      app.kubernetes.io/instance: agents-orchestrator
    containers:
      agents-orchestrator:
        container: agents-orchestrator
        sync:
          - path: ./:/opt/app/data
            noWatch: true
            excludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
            uploadExcludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
            downloadExcludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
