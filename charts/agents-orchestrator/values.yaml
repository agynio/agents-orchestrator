nameOverride: ""
fullnameOverride: ""

global:
  imageRegistry: ""
  imagePullSecrets: []

image:
  registry: ""
  repository: ghcr.io/agynio/agents-orchestrator
  tag: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

replicaCount: 2
revisionHistoryLimit: 10
updateStrategy: {}

deploymentAnnotations: {}

serviceAccount:
  create: true
  name: ""
  annotations: {}

automountServiceAccountToken: true

rbac:
  create: true
  clusterWide: false
  rules:
    - apiGroups: ["coordination.k8s.io"]
      resources: ["leases"]
      verbs: ["get", "create", "update"]

podAnnotations: {}
podLabels: {}

podSecurityContext:
  enabled: false
  fsGroup: null

securityContext:
  enabled: true
  runAsNonRoot: true
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

priorityClassName: ""
terminationGracePeriodSeconds: null

service:
  enabled: false
  type: ClusterIP
  annotations: {}
  labels: {}
  ports: []

containerPorts: []

command: []
args: []
env:
  - name: THREADS_ADDRESS
    value: ""
  - name: NOTIFICATIONS_ADDRESS
    value: ""
  - name: AGENTS_ADDRESS
    value: ""
  - name: SECRETS_ADDRESS
    value: ""
  - name: RUNNERS_ADDRESS
    value: ""
  - name: METERING_SERVICE_ADDRESS
    value: ""
  - name: METERING_SAMPLE_INTERVAL
    value: "60s"
  - name: ZITI_ENABLED
    value: "false"
  - name: ZITI_LEASE_RENEWAL_INTERVAL
    value: "2m"
  - name: ZITI_ENROLLMENT_TIMEOUT
    value: "2m"
  - name: ZITI_MANAGEMENT_ADDRESS
    value: ""
  - name: AGENT_GATEWAY_ADDRESS
    value: ""
  - name: AGENT_TRACING_ADDRESS
    value: ""
  - name: POLL_INTERVAL
    value: ""
  - name: IDLE_TIMEOUT
    value: ""
  - name: STOP_TIMEOUT_SEC
    value: ""
  - name: LEASE_NAME
    value: ""
envFrom: []
extraEnvVars: []
extraEnvVarsCM: ""
extraEnvVarsSecret: ""

configMounts: []
extraVolumeMounts: []
extraVolumes: []

initContainers: []
extraContainers: []

lifecycle: {}

livenessProbe:
  enabled: false

readinessProbe:
  enabled: false

startupProbe:
  enabled: false

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: null
  metrics: []
  behavior: {}

pdb:
  enabled: false
  minAvailable: null
  maxUnavailable: null

ingress:
  enabled: false
  ingressClassName: ""
  annotations: {}
  hosts: []
  tls: []

metrics:
  enabled: false
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: ""
    scrapeTimeout: ""
    honorLabels: false
    labels: {}
    annotations: {}
    relabelings: []
    metricRelabelings: []
    endpoints: []
