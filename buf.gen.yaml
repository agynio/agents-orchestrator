version: v2

managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/agynio/agents-orchestrator/.gen/go
inputs:
  - git_repo: https://github.com/agynio/api.git
    branch: 6dcb04a7bdc5f46b3cb13bce95561b7bf3daceaf
    subdir: proto
    paths:
      - agynio/api/runner/v1
      - agynio/api/runners/v1
      - agynio/api/threads/v1
      - agynio/api/notifications/v1
      - agynio/api/metering/v1
      - agynio/api/agents/v1
      - agynio/api/secrets/v1
      - agynio/api/ziti_management/v1
      - agynio/api/identity/v1
      - agynio/api/llm/v1
      - agynio/api/users/v1
      - agynio/api/organizations/v1
      - agynio/api/tracing/v1
plugins:
  - remote: buf.build/protocolbuffers/go
    out: .gen/go
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go
    out: .gen/go
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false
