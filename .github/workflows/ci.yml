name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          version: 1.66.0

      - name: Generate protobuf bindings
        run: |
          git clone https://github.com/agynio/api.git /tmp/agynio-api
          git -C /tmp/agynio-api checkout ec008b1e2dfacec3e4d85776729fe1c3d5f2c42d
          cd /tmp/agynio-api
          buf generate \
            --include-imports \
            --path proto/agynio/api/runner/v1 \
            --path proto/agynio/api/runners/v1 \
            --path proto/agynio/api/threads/v1 \
            --path proto/agynio/api/notifications/v1 \
            --path proto/agynio/api/agents/v1 \
            --path proto/agynio/api/secrets/v1 \
            --path proto/agynio/api/ziti_management/v1 \
            --path proto/agynio/api/identity/v1 \
            --path proto/agynio/api/llm/v1 \
            --path proto/agynio/api/users/v1 \
            --path proto/agynio/api/organizations/v1 \
            --template "$GITHUB_WORKSPACE/buf.gen.yaml" \
            -o "$GITHUB_WORKSPACE"

      - name: Run tests
        run: go test ./...

      - name: Build
        run: go build ./...
