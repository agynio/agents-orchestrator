name: E2E

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: e2e-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # --- Provision cluster ---

      - name: Checkout bootstrap
        uses: actions/checkout@v4
        with:
          repository: agynio/bootstrap
          path: bootstrap

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.28.7

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
          terraform_wrapper: false

      - name: Provision cluster
        working-directory: bootstrap
        run: ./apply.sh -y

      - name: Verify platform health
        working-directory: bootstrap
        run: ./.github/scripts/verify_platform_health.sh

      - name: Merge kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          cp bootstrap/stacks/k8s/.kube/agyn-local-kubeconfig.yaml "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl cluster-info
          kubectl get pods -n platform

      # --- Install DevSpace ---

      - name: Install DevSpace
        run: |
          curl -fsSL https://github.com/devspace-sh/devspace/releases/latest/download/devspace-linux-amd64 \
            -o /usr/local/bin/devspace
          chmod +x /usr/local/bin/devspace
          devspace version

      # --- Run E2E tests ---

      - name: Checkout service
        uses: actions/checkout@v4
        with:
          path: service

      - name: Deploy orchestrator from source
        working-directory: service
        run: devspace run deploy -n platform

      - name: Start workload log watcher
        run: |
          # Background process that watches for workload pods and captures their logs
          (
            while true; do
              for pod in $(kubectl get pods -n platform -l managed-by=agents-orchestrator -o name 2>/dev/null); do
                podname=$(basename "$pod")
                # Capture init container logs
                kubectl logs -n platform "$podname" -c agent-init --timestamps 2>/dev/null >> /tmp/workload-init-logs.txt || true
                # Capture main container logs  
                kubectl logs -n platform "$podname" --all-containers --timestamps 2>/dev/null >> /tmp/workload-main-logs.txt || true
                # Capture pod status
                kubectl get pod -n platform "$podname" -o wide 2>/dev/null >> /tmp/workload-status.txt || true
              done
              sleep 5
            done
          ) &
          echo $! > /tmp/watcher-pid.txt
          echo "Workload log watcher started (PID: $(cat /tmp/watcher-pid.txt))"

      - name: Run E2E tests
        working-directory: service
        run: devspace run test-e2e -n platform

      - name: Restore ArgoCD sync
        if: always()
        working-directory: service
        run: devspace run restore-argocd -n platform

      - name: Capture platform logs
        if: always()
        run: |
          # Stop the background watcher
          kill $(cat /tmp/watcher-pid.txt 2>/dev/null) 2>/dev/null || true

          echo "=== Workload init container logs (from watcher) ==="
          cat /tmp/workload-init-logs.txt 2>/dev/null || echo "No init container logs captured"
          echo ""
          echo "=== Workload main container logs (from watcher) ==="
          cat /tmp/workload-main-logs.txt 2>/dev/null || echo "No main container logs captured"
          echo ""
          echo "=== Workload pod status history ==="
          cat /tmp/workload-status.txt 2>/dev/null || echo "No status captured"
          echo ""
          echo "=== Orchestrator pod logs ==="
          kubectl logs -n platform -l app.kubernetes.io/name=agents-orchestrator \
            --tail=500 --timestamps 2>&1 || echo "Failed to fetch orchestrator logs"
          echo ""
          echo "=== E2E runner pod logs ==="
          kubectl logs -n platform -l app.kubernetes.io/name=agents-orchestrator-e2e \
            --tail=500 --timestamps 2>&1 || echo "Failed to fetch e2e-runner logs"
          echo ""
          echo "=== K8s-runner pod logs ==="
          kubectl logs -n platform -l app.kubernetes.io/name=k8s-runner \
            --tail=200 --timestamps 2>&1 || echo "Failed to fetch k8s-runner logs"
          echo ""
          echo "=== Workload pod logs (init containers) ==="
          for pod in $(kubectl get pods -n platform -l managed-by=agents-orchestrator -o name 2>/dev/null); do
            echo "--- $pod init container: agent-init ---"
            kubectl logs -n platform "$pod" -c agent-init --timestamps 2>&1 || echo "No init container logs"
          done
          echo ""
          echo "=== Workload pod logs (main containers) ==="
          kubectl logs -n platform -l managed-by=agents-orchestrator \
            --all-containers --tail=500 --timestamps 2>&1 || echo "No workload pod logs"
          echo ""
          echo "=== Workload pod describe ==="
          kubectl describe pods -n platform -l managed-by=agents-orchestrator 2>&1 || echo "No workload pods found"
