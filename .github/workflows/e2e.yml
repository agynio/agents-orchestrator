name: E2E

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: e2e-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # --- Provision cluster ---

      - name: Checkout bootstrap
        uses: actions/checkout@v4
        with:
          repository: agynio/bootstrap
          path: bootstrap

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.28.7

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
          terraform_wrapper: false

      - name: Provision cluster
        working-directory: bootstrap
        run: ./apply.sh -y

      - name: Extract cluster admin token
        working-directory: bootstrap/stacks/platform
        run: |
          echo "CLUSTER_ADMIN_TOKEN=$(terraform output -raw cluster_admin_api_token)" >> "$GITHUB_ENV"
          echo "SERVICE_IDENTITY_ID=$(terraform output -raw cluster_admin_identity_id)" >> "$GITHUB_ENV"

      - name: Verify platform health
        working-directory: bootstrap
        run: ./.github/scripts/verify_platform_health.sh

      - name: Merge kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          cp bootstrap/stacks/k8s/.kube/agyn-local-kubeconfig.yaml "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl cluster-info
          kubectl get pods -n platform

      # --- Install DevSpace ---

      - name: Install DevSpace
        run: |
          curl -fsSL https://github.com/devspace-sh/devspace/releases/latest/download/devspace-linux-amd64 \
            -o /usr/local/bin/devspace
          chmod +x /usr/local/bin/devspace
          devspace version

      # --- Run E2E tests ---

      - name: Checkout service
        uses: actions/checkout@v4
        with:
          path: service

      - name: Deploy orchestrator from source
        working-directory: service
        run: devspace run deploy -n platform

      - name: Run E2E tests
        working-directory: service
        run: devspace run test-e2e -n platform

      - name: Restore ArgoCD sync
        if: always()
        working-directory: service
        run: devspace run restore-argocd -n platform

      - name: Capture platform logs
        if: always()
        run: |
          echo "=== Orchestrator pod logs ==="
          kubectl logs -n platform -l app.kubernetes.io/name=agents-orchestrator \
            --tail=500 --timestamps 2>&1 || echo "Failed to fetch orchestrator logs"
          echo ""
          echo "=== E2E runner pod logs ==="
          kubectl logs -n platform -l app.kubernetes.io/name=agents-orchestrator-e2e \
            --tail=500 --timestamps 2>&1 || echo "Failed to fetch e2e-runner logs"
          echo ""
          echo "=== K8s-runner pod logs ==="
          kubectl logs -n platform -l app.kubernetes.io/name=k8s-runner \
            --tail=200 --timestamps 2>&1 || echo "Failed to fetch k8s-runner logs"
          echo ""
          echo "=== Workload pod logs (init containers) ==="
          for pod in $(kubectl get pods -n agyn-workloads -l managed-by=agents-orchestrator -o name 2>/dev/null); do
            echo "--- $pod init container: agent-init ---"
            kubectl logs -n agyn-workloads "$pod" -c agent-init --timestamps 2>&1 || echo "No init container logs"
          done
          echo ""
          echo "=== Workload pod logs (all containers) ==="
          for pod in $(kubectl get pods -n agyn-workloads -l managed-by=agents-orchestrator -o name 2>/dev/null); do
            for container in $(kubectl get "$pod" -n agyn-workloads -o jsonpath='{range .spec.containers[*]}{.name}{"\n"}{end}' 2>/dev/null); do
              echo "--- $pod container: $container ---"
              kubectl logs -n agyn-workloads "$pod" -c "$container" --tail=500 --timestamps 2>&1 || echo "No logs for $container"
            done
          done
          echo ""
          echo "=== Workload pod describe ==="
          kubectl describe pods -n agyn-workloads -l managed-by=agents-orchestrator 2>&1 || echo "No workload pods found"
